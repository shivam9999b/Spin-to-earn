<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow-x:hidden;}
body{font-family:'Roboto',sans-serif;background:#e0e0e0;display:flex;justify-content:center;align-items:center;}
.phone-screen{width:100%;max-width:480px;height:100vh;background:#f4f5f9;display:flex;flex-direction:column;}
header{text-align:center;padding:15px;background:#fff;border-bottom:1px solid #eee;}
main{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:20px;}
.balance-card{background:#03A9F4;color:#fff;padding:20px;border-radius:12px;}
.balance-card h2{font-size:2.5rem;margin:5px 0;}
.withdrawal-section,.addmoney-section{background:#fff;padding:15px;border-radius:12px;}
.upi-input{position:relative;margin-bottom:20px;}
.upi-input i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#03A9F4;}
.upi-input input{width:100%;padding:12px 12px 12px 40px;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f9;}
.amount-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.amount-btn{background:#f4f5f9;border:1px solid #e0e0e0;border-radius:8px;padding:10px;cursor:pointer;text-align:center;}
.amount-btn.selected{background:#e3f2fd;border-color:#03A9F4;}
.custom-input{display:flex;gap:10px;}
.custom-input input{flex:1;padding:10px;border:1px solid #e0e0e0;border-radius:8px;text-align:center;}
.action-btn{width:100%;padding:15px;background:#03A9F4;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:10px;}
.history-section{background:#fff;padding:15px;border-radius:12px;}
.history-item{display:flex;gap:15px;padding:10px 0;border-bottom:1px solid #eee;cursor:pointer;}
.status{font-size:0.75rem;padding:3px 8px;border-radius:10px;}
.status.pending{background:#fff8e1;color:#fbc02d;}
.status.completed{background:#e8f5e9;color:#2e7d32;}
.status.failed{background:#ffebee;color:#c62828;}
footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;}
footer nav{display:flex;justify-content:space-around;padding:10px 0;}
.nav-item{display:flex;flex-direction:column;align-items:center;color:#999;text-decoration:none;}
.nav-item.active{color:#03A9F4;}
#detailsPopup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
#detailsPopup .popup-content{background:#fff;width:90%;max-width:350px;border-radius:12px;padding:20px;position:relative;}
.close-btn{position:absolute;top:10px;right:10px;border:none;background:none;font-size:18px;cursor:pointer;}
</style>
</head>

<body>

<div class="phone-screen">

<header>
<h1>Wallet</h1>
</header>

<main>

<section class="balance-card">
<h2 id="walletAmount">₹0.00</h2>
<p id="walletPoints">0 points</p>
<p>1000 points = ₹5</p>
</section>

<section class="addmoney-section">
<h3>Add Money</h3>
<div class="custom-input">
<input type="number" id="addAmount" placeholder="Enter Amount ₹">
</div>
<button class="action-btn" id="addMoneyBtn">Add Money</button>
</section>

<section class="withdrawal-section">

<div class="upi-input">
<i class="fa-solid fa-credit-card"></i>
<input type="text" id="upiId" placeholder="Enter UPI ID">
</div>

<div class="amount-grid">
<button class="amount-btn" data-points="4000">₹20</button>
<button class="amount-btn" data-points="10000">₹50</button>
<button class="amount-btn" data-points="20000">₹100</button>

<div class="custom-input">
<input type="number" id="customAmount" placeholder="Custom ₹">
</div>
</div>

<button class="action-btn withdraw-now-btn">Withdraw Now</button>

</section>

<section class="history-section">
<h3>Transaction History</h3>
<div id="historyList"></div>
</section>

</main>

<footer>
<nav>
<a href="spin.html" class="nav-item">Spin</a>
<a href="wallet.html" class="nav-item active">Wallet</a>
<a href="prbe.html" class="nav-item">Profile</a>
</nav>
</footer>

</div>

<div id="detailsPopup">
<div class="popup-content">
<button class="close-btn">✖</button>
<h3>Transaction Details</h3>
<div id="detailsBody"></div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDllI",
authDomain:"spin-to-earn-ba587.firebaseapp.com",
projectId:"spin-to-earn-ba587",
storageBucket:"spin-to-earn-ba587.appspot.com",
messagingSenderId:"508392305853",
appId:"1:508392305853:web:404509d298fc8ee25e73d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId=null;
let userData={points:0};

async function loginGoogle(){
await signInWithPopup(auth,new GoogleAuthProvider());
}

onAuthStateChanged(auth,async(user)=>{

if(user){

userId=user.uid;

const ref=doc(db,"users",userId);
const snap=await getDoc(ref);

if(snap.exists()){
userData=snap.data();
}else{
await setDoc(ref,{points:0});
}

updateUI();
listenTransactions();

}else{
loginGoogle();
}

});

function updateUI(){

document.getElementById("walletPoints").innerText=userData.points+" points";

document.getElementById("walletAmount").innerText="₹"+((userData.points/1000)*5).toFixed(2);

}

document.getElementById("addMoneyBtn").onclick=async()=>{

const amount=parseFloat(document.getElementById("addAmount").value);

if(!amount||amount<10){
alert("Minimum add ₹10");
return;
}

const addPoints=(amount/5)*1000;

userData.points+=addPoints;

await setDoc(doc(db,"users",userId),{points:userData.points},{merge:true});

await addDoc(collection(db,"users",userId,"withdrawals"),{

amount:amount,
points:addPoints,
upi:"Wallet Recharge",
status:"COMPLETED",
date:new Date()

});

alert("Money Added Successfully");

updateUI();

};

let selectedPoints=0;

document.querySelectorAll(".amount-btn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".amount-btn").forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

selectedPoints=parseInt(btn.dataset.points);

};

});

document.getElementById("customAmount").oninput=(e)=>{

const custom=parseFloat(e.target.value)||0;

selectedPoints=(custom/5)*1000;

};

document.querySelector(".withdraw-now-btn").onclick=async()=>{

const upi=document.getElementById("upiId").value.trim();

const rupees=(selectedPoints/1000)*5;

if(!upi){
alert("Enter UPI ID");
return;
}

if(rupees<20){
alert("Minimum withdraw ₹20");
return;
}

if(userData.points<selectedPoints){
alert("Insufficient Balance");
return;
}

userData.points-=selectedPoints;

await updateDoc(doc(db,"users",userId),{points:userData.points});

await addDoc(collection(db,"users",userId,"withdrawals"),{

amount:rupees,
points:selectedPoints,
upi:upi,
status:"PENDING",
date:new Date()

});

alert("Withdrawal Requested");

updateUI();

};

function listenTransactions(){

const q=query(collection(db,"users",userId,"withdrawals"),orderBy("date","desc"));

onSnapshot(q,(snap)=>{

const list=document.getElementById("historyList");

list.innerHTML="";

snap.forEach(d=>{

const data=d.data();

const item=document.createElement("div");

item.className="history-item";

item.innerHTML=`₹${data.amount} - ${data.status}`;

list.appendChild(item);

});

});

}

</script>

</body>
  </html>
