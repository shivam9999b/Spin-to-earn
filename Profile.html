<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
--primary:#3a86ff;
--bg:#f4f6f9;
--card:#fff;
--muted:#777;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:#222;
padding-bottom:100px;
}

.wrap{
max-width:460px;
margin:20px auto;
background:var(--card);
border-radius:12px;
box-shadow:0 6px 24px rgba(0,0,0,.08);
overflow:hidden;
}

.profile-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-bottom:1px solid #eee;
}

.profile-header h1{
font-size:18px;
}

.profile-header button{
background:none;
border:0;
cursor:pointer;
font-size:16px;
color:var(--muted);
}

.user-card{
background:var(--primary);
color:#fff;
padding:22px;
text-align:center;
position:relative;
}

.avatar{
width:88px;
height:88px;
border-radius:50%;
background:#fff;
margin:0 auto 10px;
overflow:hidden;
border:3px solid #fff;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
color:var(--primary);
font-size:36px;
}

.edit-upi{
position:absolute;
right:14px;
top:14px;
background:#ffd54f;
border-radius:18px;
padding:6px 10px;
font-weight:600;
color:#222;
}

.user-card h2{
margin-top:6px;
margin-bottom:4px;
font-size:20px;
}

.user-card p{
margin:2px 0;
font-size:13px;
opacity:.9;
}

main{
padding:16px;
}

.section{
background:var(--card);
padding:12px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,.03);
}

label{
display:block;
font-size:13px;
color:var(--muted);
margin-bottom:6px;
}

.input{
display:flex;
gap:8px;
}

.input input{
flex:1;
padding:10px;
border:1px solid #e5e7eb;
border-radius:8px;
font-size:14px;
}

.btn{
background:#ffd54f;
border:0;
padding:10px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:12px;
}

.stat{
text-align:center;
}

.stat .v{
font-weight:700;
font-size:16px;
}

.ref-row{
display:flex;
gap:8px;
align-items:center;
}

.ref-code{
background:#eef6ff;
padding:8px 12px;
border-radius:8px;
color:var(--primary);
font-weight:700;
}

.small{
font-size:12px;
color:var(--muted);
}

footer{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:10px;
max-width:460px;
width:96%;
background:#fff;
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
display:flex;
justify-content:space-around;
padding:10px;
}

footer a{
text-align:center;
color:#777;
text-decoration:none;
}

footer a.active{
color:var(--primary);
font-weight:700;
}

</style>
</head>

<body>

<div class="wrap">

<header class="profile-header">
<h1>Profile</h1>
<button id="logoutBtn" style="display:none">
<i class="fas fa-sign-out-alt"></i>
</button>
</header>

<section class="user-card">

<div class="avatar" id="avatar">U</div>

<div class="edit-upi" id="editUpiBtn" style="display:none">
Edit UPI
</div>

<h2 id="nameDisplay">Guest User</h2>

<p id="emailDisplay" class="small">
Please login on home page
</p>

<p id="joinedDisplay" class="small"></p>

<div class="stats">

<div class="stat">
<div class="v" id="points">0</div>
<div class="small">Points</div>
</div>

<div class="stat">
<div class="v" id="spins">0/5</div>
<div class="small">Spins</div>
</div>

<div class="stat">
<div class="v" id="balance">₹0.00</div>
<div class="small">Wallet</div>
</div>

</div>

</section>

<main>

<div class="section">

<label>UPI ID</label>

<div class="input">
<input id="upiInput" placeholder="Enter UPI ID">
<button id="saveUpi" class="btn" style="display:none">Save</button>
</div>

<p class="small" id="upiSavedInfo"></p>

</div>

<div class="section">

<label>Your referral code</label>

<div class="ref-row">
<div class="ref-code" id="refCode">—</div>
<button id="copyRef" class="btn">Copy</button>
</div>

</div>

</main>

</div>

<footer>

<a href="spin.html">
<i class="fas fa-sync-alt"></i>
<div>Spin</div>
</a>

<a href="wallet.html">
<i class="fas fa-wallet"></i>
<div>Wallet</div>
</a>

<a href="#" class="active">
<i class="fas fa-user"></i>
<div>Profile</div>
</a>

</footer>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyA_lHpohwMjEkWc0BCPM-2177ZkVsAVhFY",
authDomain:"login-page-e24df.firebaseapp.com",
projectId:"login-page-e24df",
storageBucket:"login-page-e24df.firebasestorage.app",
messagingSenderId:"742113925687",
appId:"1:742113925687:web:8827ae396029020b8d3db2",
measurementId:"G-QBG96SLGCK"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);

let userId=null;

const nameDisplay=document.getElementById("nameDisplay");
const emailDisplay=document.getElementById("emailDisplay");
const avatar=document.getElementById("avatar");
const points=document.getElementById("points");
const spins=document.getElementById("spins");
const balance=document.getElementById("balance");
const upiInput=document.getElementById("upiInput");
const saveUpi=document.getElementById("saveUpi");
const upiSavedInfo=document.getElementById("upiSavedInfo");
const logoutBtn=document.getElementById("logoutBtn");
const editUpiBtn=document.getElementById("editUpiBtn");
const refCode=document.getElementById("refCode");
const copyRef=document.getElementById("copyRef");

onAuthStateChanged(auth,async(user)=>{

if(user){

userId=user.uid;

logoutBtn.style.display="block";

nameDisplay.textContent=user.displayName;
emailDisplay.textContent=user.email;

if(user.photoURL){
avatar.innerHTML=`<img src="${user.photoURL}" style="width:100%;height:100%;border-radius:50%">`;
}

refCode.textContent=user.uid.slice(0,6).toUpperCase();

const snap=await getDoc(doc(db,"users",userId));

if(snap.exists()){

const data=snap.data();

points.textContent=data.points||0;

spins.textContent=(data.spinsToday||0)+"/5";

balance.textContent="₹"+((data.points||0)/1000).toFixed(2);

if(data.upi){
upiInput.value=data.upi;
upiSavedInfo.textContent="Saved: "+data.upi;
editUpiBtn.style.display="block";
}else{
saveUpi.style.display="block";
}

}

}

});

logoutBtn.onclick=()=>signOut(auth);

editUpiBtn.onclick=()=>{
saveUpi.style.display="block";
editUpiBtn.style.display="none";
};

saveUpi.onclick=async()=>{

const val=upiInput.value.trim();

if(!val)return alert("Enter UPI");

await updateDoc(doc(db,"users",userId),{upi:val});

upiSavedInfo.textContent="Saved: "+val;

saveUpi.style.display="none";

editUpiBtn.style.display="block";

};

copyRef.onclick=()=>{

navigator.clipboard.writeText(refCode.textContent);

alert("Referral Code Copied");

};

</script>

</body>
  </html>
